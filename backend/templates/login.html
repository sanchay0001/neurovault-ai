<!DOCTYPE html>
<html>
<head>
    <title>Login | NUEROVAULT-AI</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0px 0px 40px rgba(0,0,0,0.4);
        }

        .brand {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #10b981;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            background: #334155;
            color: white;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="brand">NUEROVAULT-AI</div>

    <h2>Create Account</h2>
    <form action="/register" method="post">
        <input type="text" name="username" placeholder="Choose Username" required>
        <input type="password" name="password" placeholder="Create Password" required>
        <button type="submit">Register</button>
    </form>

    <div class="divider">OR</div>

    <h2>Login</h2>
    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
