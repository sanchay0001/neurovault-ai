<!DOCTYPE html>
<html>
<head>
<title>NeuroVault AI</title>
<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:rgba(30,41,59,0.9);
backdrop-filter:blur(12px);
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:20px;
}

.new-chat{
background:#3b82f6;
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
margin-bottom:20px;
}

.conversation{
background:#334155;
padding:10px;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.conversation:hover{
background:#475569;
}

.delete{
color:#ef4444;
cursor:pointer;
margin-left:10px;
}

.chat-area{
flex:1;
display:flex;
flex-direction:column;
padding:30px;
}

.messages{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.message{
padding:12px 16px;
margin:10px 0;
border-radius:16px;
max-width:65%;
word-wrap:break-word;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.assistant{
background:#374151;
align-self:flex-start;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:12px;
border:none;
outline:none;
}

button.send{
background:#22c55e;
border:none;
padding:14px 20px;
border-radius:12px;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">NeuroVault AI</div>
<button class="new-chat" onclick="newChat()">+ New Chat</button>
<div id="conversationList"></div>
<a href="/logout" style="margin-top:auto;color:#94a3b8;">Logout</a>
</div>

<div class="chat-area">
<div class="messages" id="messages"></div>
<div class="input-area">
<input id="messageInput" placeholder="Ask about finance, habits, health...">
<button class="send" onclick="sendMessage()">Send</button>
</div>
</div>

<script>
let currentConversation = null;

/* =========================
   NEW CHAT
========================= */
function newChat(){
    currentConversation = crypto.randomUUID();
    document.getElementById("messages").innerHTML = "";
}

/* =========================
   LOAD CONVERSATIONS
========================= */
async function loadConversations(){
    const res = await fetch("/conversations");
    const data = await res.json();

    const list = document.getElementById("conversationList");
    list.innerHTML = "";

    data.conversations.forEach(chat => {

        const div = document.createElement("div");
        div.className = "conversation";

        const title = document.createElement("span");
        title.innerText = chat.title || "New Chat";

        const del = document.createElement("span");
        del.className = "delete";
        del.innerText = "✖";

        /* DELETE (prevent parent click) */
        del.onclick = async (e) => {
            e.stopPropagation();
            await deleteChat(chat.id);
        };

        div.appendChild(title);
        div.appendChild(del);

        /* LOAD MESSAGES WHEN CLICKING CHAT */
        div.onclick = () => {
            loadMessages(chat.id);
        };

        list.appendChild(div);
    });
}

/* =========================
   LOAD MESSAGES
========================= */
async function loadMessages(conversationId){
    const res = await fetch(`/messages/${conversationId}`);
    const data = await res.json();

    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    data.messages.forEach(msg => {
        addMessage(msg.message, msg.role);
    });

    currentConversation = conversationId;

    scrollToBottom();
}

/* =========================
   DELETE CHAT
========================= */
async function deleteChat(id){
    await fetch(`/delete_conversation/${id}`, {method:"DELETE"});

    if(currentConversation === id){
        document.getElementById("messages").innerHTML = "";
        currentConversation = null;
    }

    loadConversations();
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMessage(){
    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if(!message) return;

    if(!currentConversation){
        currentConversation = crypto.randomUUID();
    }

    addMessage(message, "user");
    input.value = "";

    const formData = new FormData();
    formData.append("message", message);
    formData.append("conversation_id", currentConversation);

    const res = await fetch("/chat", {
        method:"POST",
        body:formData
    });

    const data = await res.json();

    addMessage(data.response, "assistant");

    scrollToBottom();
    loadConversations();
}

/* =========================
   ADD MESSAGE
========================= */
function addMessage(text, role){
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerText = text;

    document.getElementById("messages").appendChild(div);
}

/* =========================
   SCROLL
========================= */
function scrollToBottom(){
    const messagesDiv = document.getElementById("messages");
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* =========================
   ENTER KEY
========================= */
document.getElementById("messageInput")
.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

/* INITIAL LOAD */
loadConversations();

</script>

</body>
</html>
